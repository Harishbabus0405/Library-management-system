<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Main Container Styles */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Form Header Styles */
    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #eaeaea;
    }

    .form-header h2 {
      font-size: 1.8rem;
      color: #2c3e50;
      margin: 0;
      font-weight: 600;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 2px 10px rgba(106, 126, 251, 0.3);
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(106, 126, 251, 0.4);
    }

    /* Student Form Styles */
    .student-form {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .form-group {
      margin-bottom: 1.8rem;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 500;
      color: #34495e;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
      background-color: #f9f9f9;
    }

    .form-group input:focus {
      outline: none;
      border-color: #6e8efb;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(110, 142, 251, 0.2);
    }

    .form-group input::placeholder {
      color: #95a5a6;
      opacity: 0.7;
    }

    /* Submit Button Styles */
    .submit-button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
      background: linear-gradient(135deg, #3ea2f8, #00e0f8);
    }

    /* Form Validation Styles */
    input:invalid {
      border-color: #ff9e9e;
    }

    input:valid {
      border-color: #a0e7a0;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }

      .form-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .student-form {
        padding: 1.5rem;
      }

      .form-group input {
        padding: 0.8rem 1rem;
      }
    }

    @media (max-width: 480px) {
      .back-button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-header">
      <h2>Add New Student</h2>
      <a href="dashboard.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>
    
    <form id="studentForm" class="student-form">
      <div class="form-group">
        <label for="name">Student Name</label>
        <input type="text" id="name" placeholder="Enter student name" required>
      </div>
      
      <div class="form-group">
        <label for="regNumber">Registration Number</label>
        <input type="text" id="regNumber" placeholder="Enter registration number" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter student email" required>
      </div>
      
      <div class="form-group">
        <label for="department">Department</label>
        <input type="text" id="department" placeholder="Enter department" required>
      </div>
      
      <button type="submit" class="submit-button">
        <i class="fas fa-user-plus"></i> Add Student
      </button>
    </form>
  </div>

  <script>
    document.getElementById('studentForm').addEventListener('submit', function(e) {
      

  e.preventDefault();
  const payload = {
    name: document.getElementById('name').value,
    regNumber: document.getElementById('regNumber').value,
    email: document.getElementById('email').value,
    department: document.getElementById('department').value
  };
  try {
    const data = await apiFetch('/students', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // success UI
    const successMsg = document.createElement('div');
    successMsg.className = 'success-message';
    successMsg.innerHTML = `Student added successfully (id: ${data.id})`;
    document.body.appendChild(successMsg);
    setTimeout(() => successMsg.remove(), 3000);
    this.reset();
  } catch (err) {
    console.error(err);
    alert('Error adding student: ' + err.message);
  }

});
  </script>
</body>
</html>
