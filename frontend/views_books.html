<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Books</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Main Styles */
    body {
      background-color: #f5f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Container Styles */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header Styles */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #eaeaea;
    }

    .header h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin: 0;
      font-weight: 600;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 2px 10px rgba(106, 126, 251, 0.3);
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(106, 126, 251, 0.4);
    }

    /* Controls Section */
    .controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      position: relative;
      flex-grow: 1;
      min-width: 300px;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #7f8c8d;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 40px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
      background-color: #f9f9f9;
    }

    .search-input:focus {
      outline: none;
      border-color: #6e8efb;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(110, 142, 251, 0.2);
    }

    /* Book Grid Layout */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      padding: 1rem 0;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #6e8efb #f5f7fa;
    }

    .book-grid::-webkit-scrollbar {
      width: 8px;
    }

    .book-grid::-webkit-scrollbar-track {
      background: #f5f7fa;
      border-radius: 10px;
    }

    .book-grid::-webkit-scrollbar-thumb {
      background-color: #6e8efb;
      border-radius: 10px;
    }

    /* Book Card Styles */
    .book-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .book-cover {
      height: 280px;
      background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .book-card:hover .book-cover img {
      transform: scale(1.05);
    }

    .book-cover-placeholder {
      text-align: center;
      color: #9ca3af;
      padding: 1rem;
    }

    .book-cover-placeholder i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .book-details {
      padding: 1.2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .book-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2c3e50;
      margin: 0 0 0.5rem 0;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      max-height: 3em; /* Fallback for browsers that don't support line-clamp */
    }

    .book-author {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin: 0 0 0.5rem 0;
    }

    .book-meta {
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      font-size: 0.85rem;
    }

    .book-isbn {
      color: #6b7280;
      background: #f3f4f6;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .book-quantity {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .book-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px dashed #e5e7eb;
    }

    .action-btn {
      padding: 0.5rem 0.8rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .action-btn i {
      font-size: 0.9rem;
    }

    .delete-btn {
      background-color: #ffebee;
      color: #dc3545;
    }

    .delete-btn:hover {
      background-color: #f8d7da;
      transform: translateY(-1px);
    }

    /* Status Badge */
    .availability {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .available {
      background-color: #e3f9e5;
      color: #28a745;
    }

    .unavailable {
      background-color: #ffebee;
      color: #dc3545;
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #7f8c8d;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #bdc3c7;
    }

    .empty-state a {
      color: #6e8efb;
      text-decoration: none;
      font-weight: 500;
    }

    .empty-state a:hover {
      text-decoration: underline;
    }

    /* Animation Keyframes */
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Responsive Adjustments */
    @media (max-width: 1200px) {
      .book-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }

    @media (max-width: 992px) {
      .book-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      
      .book-cover {
        height: 240px;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      
      .controls {
        flex-direction: column;
      }
      
      .search-box {
        width: 100%;
      }
      
      .book-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      
      .book-cover {
        height: 220px;
      }
    }

    @media (max-width: 576px) {
      .book-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }
      
      .book-cover {
        height: 200px;
      }
      
      .book-details {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Book Inventory</h1>
      <a href="dashboard.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>
    
    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="bookSearch" placeholder="Search books..." class="search-input">
      </div>
    </div>
    
    <div class="book-grid" id="bookGrid">
      <!-- Books will be inserted here by JavaScript -->
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const books = JSON.parse(localStorage.getItem('books')) || [];
      const bookGrid = document.getElementById('bookGrid');
      
      function renderBooks(booksToRender) {
        bookGrid.innerHTML = '';
        
        if (booksToRender.length === 0) {
          bookGrid.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-book-open"></i>
              <p>No books found. <a href="add_book.html">Add a book</a> to get started.</p>
            </div>
          `;
          return;
        }
        
        booksToRender.forEach(book => {
          const bookCard = document.createElement('div');
          bookCard.className = 'book-card';
          bookCard.innerHTML = `
            <div class="book-cover">
              ${book.cover ? 
                `<img src="${book.cover}" alt="${book.title}">` : 
                `<div class="book-cover-placeholder">
                  <i class="fas fa-book-open"></i>
                  <p>No cover image</p>
                </div>`
              }
            </div>
            <div class="book-details">
              <h3 class="book-title">${book.title}</h3>
              <p class="book-author">by ${book.author}</p>
              
              <div class="book-meta">
                <span class="availability ${book.available > 0 ? 'available' : 'unavailable'}">
                  ${book.available}/${book.quantity} available
                </span>
                <span class="book-isbn">${book.isbn}</span>
              </div>
              
              <div class="book-actions">
                <button class="action-btn delete-btn" data-id="${book.id}">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </div>
          `;
          bookGrid.appendChild(bookCard);
        });
        
        // Add event listeners to delete buttons
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const bookId = parseInt(this.getAttribute('data-id'));
            if (confirm('Are you sure you want to delete this book?')) {
              const updatedBooks = books.filter(book => book.id !== bookId);
              localStorage.setItem('books', JSON.stringify(updatedBooks));
              renderBooks(updatedBooks);
              
              // Show deletion success message
              const successMsg = document.createElement('div');
              successMsg.innerHTML = `
                <div style="
                  position: fixed;
                  top: 20px;
                  right: 20px;
                  background: #4BB543;
                  color: white;
                  padding: 1rem 1.5rem;
                  border-radius: 8px;
                  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                  z-index: 1000;
                  display: flex;
                  align-items: center;
                  gap: 0.5rem;
                  animation: slideIn 0.3s ease-out;
                ">
                  <i class="fas fa-check-circle"></i>
                  Book deleted successfully!
                </div>
              `;
              document.body.appendChild(successMsg);
              
              setTimeout(() => {
                successMsg.style.animation = 'fadeOut 0.3s ease-out';
                setTimeout(() => successMsg.remove(), 300);
              }, 3000);
            }
          });
        });
      }
      
      // Initial render
      renderBooks(books);
      
      // Search functionality
      document.getElementById('bookSearch').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const filteredBooks = books.filter(book => 
          book.title.toLowerCase().includes(searchTerm) || 
          book.author.toLowerCase().includes(searchTerm) ||
          book.isbn.toLowerCase().includes(searchTerm)
        );
        renderBooks(filteredBooks);
      });
    });
  </script>

<script>
async function loadBooksFromServer() {
  try {
    const res = await fetch('http://localhost:5000/api/books');
    const books = await res.json();
    if (typeof renderBooks === 'function') renderBooks(books);
    else console.log('renderBooks not found');
  } catch (err) {
    console.error('Failed to load books', err);
    if (typeof renderBooks === 'function') renderBooks([]);
  }
}
document.addEventListener('DOMContentLoaded', loadBooksFromServer);
</script>
</body>
</html>
