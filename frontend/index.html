<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="welcome-page">
  <div class="particles-container" id="particles-js"></div>
  <div class="container animate__animated animate__fadeIn">
    <h2 class="welcome-title">Welcome to Library Management System</h2>
    <p class="welcome-subtitle">Manage books, students, and transactions with ease.</p>
    <div class="cta-container">
      <a href="selection.html" class="cta-button animate__animated animate__pulse animate__infinite">
        Login to Continue
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="app.js"></script>

<script>
  const API_BASE = 'http://localhost:5000/api';

  async function apiFetch(path, options) {
    const res = await fetch(API_BASE + path, options);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || JSON.stringify(data) || 'Server error');
    return data;
  }
</script>

</body>
</html>
