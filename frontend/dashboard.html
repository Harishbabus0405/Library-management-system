<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="dashboard-header">
      <h2>Welcome to Library Dashboard</h2>
      <div class="user-profile">
        <span>Admin</span>
        <div class="avatar">A</div>
      </div>
    </header>
    <div class="grid">
      <a href="add_book.html" class="card">
        <div class="card-icon">📚</div>
        <h3>Add Book</h3>
      </a>
      <a href="views_books.html" class="card">
        <div class="card-icon">📖</div>
        <h3>View Books</h3>
      </a>
      <a href="add_student.html" class="card">
        <div class="card-icon">👤</div>
        <h3>Add Student</h3>
      </a>
      <a href="views_students.html" class="card">
        <div class="card-icon">🎓</div>
        <h3>View Students</h3>
      </a>
      <a href="issue_book.html" class="card">
        <div class="card-icon">📤</div>
        <h3>Issue Book</h3>
      </a>
      <a href="return_book.html" class="card">
        <div class="card-icon">📥</div>
        <h3>Return Book</h3>
      </a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
